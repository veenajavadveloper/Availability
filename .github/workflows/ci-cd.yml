name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm install

  semgrep_sast:
    name: SAST (Semgrep)
    needs: install
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Run Semgrep
        run: semgrep scan --config auto --error --sarif --output=semgrep.sarif
      - name: Upload SARIF to GitHub code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4
        with:
          sarif_file: semgrep.sarif

  npm_audit_sca:
    name: SCA (npm audit)
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm install
      - run: npm audit --json > npm-audit-report.json || true
      - run: npm audit --audit-level=high
      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: npm-audit-report
          path: npm-audit-report.json

  build:
    name: Build
    needs: [semgrep_sast, npm_audit_sca]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm install
      - run: npm run build
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/

  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm install
      - run: npm test
      - name: Add coverage summary to job summary
        if: always()
        run: |
          node -e '
            const { total } = require("./coverage/coverage-summary.json");
            const pct = (m) => total[m].pct + "%";
            console.log("## Test Coverage\n");
            console.log("| Metric | Coverage |");
            console.log("|---|---|");
            console.log(`| Statements | ${pct("statements")} |`);
            console.log(`| Branches | ${pct("branches")} |`);
            console.log(`| Functions | ${pct("functions")} |`);
            console.log(`| Lines | ${pct("lines")} |`);
          ' >> "$GITHUB_STEP_SUMMARY"
      - name: Upload test results (JUnit) and coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-reports
          path: |
            junit.xml
            coverage/

  deploy:
    name: Deploy
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm install
      - run: npm run build
      - run: npm start